<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>道具商城價格搜尋器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; color: #2c3e50; font-size: 1.5rem; }
        
        /* 搜尋框樣式 */
        .search-box {
            width: 100%;
            padding: 12px 20px;
            margin: 20px 0;
            box-sizing: border-box;
            border: 2px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .search-box:focus { border-color: #3498db; }

        /* 表格樣式 */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #3498db; color: white; font-weight: 600; }
        tr:hover { background-color: #f9f9f9; }
        .no-result { padding: 20px; text-align: center; color: #888; }
        
        /* 狀態提示 */
        #status { text-align: center; font-size: 0.8rem; color: #999; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛒 商店道具價格查詢</h1>
    
    <input type="text" id="searchInput" class="search-box" placeholder="輸入道具名稱或關鍵字..." autofocus>
    
    <div id="tableContainer">
        <table id="resultTable">
            <thead>
                <tr id="tableHeader">
                    </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="100%" class="no-result">正在載入數據...</td></tr>
            </tbody>
        </table>
    </div>
    
    <div id="status"></div>
</div>

<script>
    let inventoryData = [];
    const searchInput = document.getElementById('searchInput');
    const tableBody = document.getElementById('tableBody');
    const tableHeader = document.getElementById('tableHeader');
    const status = document.getElementById('status');

    // 1. 自動讀取 CSV
    function loadData() {
        Papa.parse("item_price.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                inventoryData = results.data;
                renderHeader(results.meta.fields);
                renderTable(inventoryData);
                status.innerText = `成功載入 ${inventoryData.length} 筆資料`;
            },
            error: function(err) {
                status.innerText = "讀取 CSV 失敗，請確保檔案在同一個資料夾中。";
                console.error(err);
            }
        });
    }

    // 2. 渲染表頭
    function renderHeader(fields) {
        tableHeader.innerHTML = fields.map(f => `<th>${f}</th>`).join('');
    }

    // 3. 渲染表格內容
    function renderTable(data) {
        if (data.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="100%" class="no-result">找不到相關道具</td></tr>';
            return;
        }
        
        tableBody.innerHTML = data.map(row => {
            return `<tr>${Object.values(row).map(val => `<td>${val}</td>`).join('')}</tr>`;
        }).join('');
    }

    // 4. 即時過濾功能
    searchInput.addEventListener('input', (e) => {
        const searchTerm = e.target.value.toLowerCase();
        const filtered = inventoryData.filter(item => {
            // 搜尋所有欄位內容
            return Object.values(item).some(val => 
                String(val).toLowerCase().includes(searchTerm)
            );
        });
        renderTable(filtered);
    });

    // 初始化
    window.onload = loadData;
</script>

</body>
</html>
