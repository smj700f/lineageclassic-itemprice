<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>道具價格快速查詢系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f5f7fa; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; color: #2c3e50; }
        .card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* 搜尋與按鈕 */
        .input-group { margin-bottom: 15px; }
        .search-input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .list-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; max-height: 400px; overflow-y: auto; padding: 10px; border: 1px solid #eee; border-radius: 6px; background: #fafafa; }
        .item-btn { padding: 10px; background: white; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; font-size: 14px; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }
        .item-btn:hover { background: #3498db; color: white; border-color: #3498db; }

        /* 結果顯示 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #3498db; color: white; }
        .price { font-weight: bold; color: #e74c3c; }
        .npc { color: #27ae60; font-weight: bold; }
        .hidden { display: none; }
        .back-btn { background: #95a5a6; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 10px; }
        
        /* 工具列 */
        .toolbar { text-align: right; margin-bottom: 10px; }
        .encoding-btn { font-size: 12px; background: #eee; border: 1px solid #ccc; cursor: pointer; padding: 4px 8px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>道具價格查詢系統</h1>
    
    <div class="toolbar">
        <span style="font-size: 12px; color: #666;">如果看到亂碼，請嘗試：</span>
        <button class="encoding-btn" onclick="reloadWithEncoding('big5')">切換 Big5 (ANSI)</button>
        <button class="encoding-btn" onclick="reloadWithEncoding('utf-8')">切換 UTF-8</button>
    </div>

    <div id="view-main">
        <div class="card">
            <h3>方法一：關鍵字搜尋</h3>
            <div class="input-group">
                <input type="text" id="keyword" class="search-input" placeholder="請輸入道具名稱關鍵字...">
            </div>
            <div id="search-list" class="list-grid hidden"></div>
        </div>

        <div class="card">
            <h3>方法二：瀏覽所有道具</h3>
            <div id="all-list" class="list-grid"></div>
        </div>
    </div>

    <div id="view-result" class="hidden">
        <button class="back-btn" onclick="showMain()">← 返回列表</button>
        <div class="card">
            <h2 id="res-title" style="margin-top:0; color:#3498db;"></h2>
            <table>
                <thead>
                    <tr>
                        <th>NPC / 地點</th>
                        <th>價格 (由高到低)</th>
                    </tr>
                </thead>
                <tbody id="res-table"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let db = [];
    let currentEncoding = 'big5';

    // 1. 讀取 CSV
    async function loadData(encoding) {
        try {
            const response = await fetch('item_price.csv');
            const buffer = await response.arrayBuffer();
            const decoder = new TextDecoder(encoding);
            const text = decoder.decode(buffer);

            Papa.parse(text, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    db = results.data;
                    renderLists();
                }
            });
        } catch (err) {
            alert("讀取檔案失敗，請確保 item_price.csv 存在。");
        }
    }

    // 2. 渲染清單
    function renderLists() {
        const keywordInput = document.getElementById('keyword');
        const searchList = document.getElementById('search-list');
        const allList = document.getElementById('all-list');

        // 渲染所有道具
        allList.innerHTML = '';
        db.forEach(item => {
            const name = item["道具名稱"];
            if (name) allList.appendChild(createBtn(item));
        });

        // 關鍵字搜尋功能
        keywordInput.oninput = () => {
            const val = keywordInput.value.trim().toLowerCase();
            if (!val) {
                searchList.classList.add('hidden');
                return;
            }
            searchList.classList.remove('hidden');
            searchList.innerHTML = '';
            const filtered = db.filter(i => String(i["道具名稱"]).toLowerCase().includes(val));
            filtered.forEach(item => searchList.appendChild(createBtn(item)));
        };
    }

    function createBtn(item) {
        const btn = document.createElement('button');
        btn.className = 'item-btn';
        btn.innerText = item["道具名稱"];
        btn.onclick = () => showResult(item);
        return btn;
    }

    // 3. 顯示查詢結果
    function showResult(item) {
        document.getElementById('res-title').innerText = item["道具名稱"];
        const tbody = document.getElementById('res-table');
        tbody.innerHTML = '';

        let prices = [];
        // 抓取所有 NPC 欄位並過濾
        Object.keys(item).forEach(key => {
            if (key !== "編號" && key !== "道具名稱") {
                const p = parseInt(String(item[key]).replace(/,/g, ''));
                if (p > 0) { // 排除 0 元與空值
                    prices.push({ name: key, val: p });
                }
            }
        });

        // 排序：由大到小
        prices.sort((a, b) => b.val - a.val);

        prices.forEach(p => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="npc">${p.name}</td><td class="price">${p.val.toLocaleString()} 元</td>`;
            tbody.appendChild(tr);
        });

        document.getElementById('view-main').classList.add('hidden');
        document.getElementById('view-result').classList.remove('hidden');
        window.scrollTo(0, 0);
    }

    function showMain() {
        document.getElementById('view-result').classList.add('hidden');
        document.getElementById('view-main').classList.remove('hidden');
    }

    function reloadWithEncoding(enc) {
        currentEncoding = enc;
        loadData(enc);
    }

    // 初始載入
    loadData('utf-8');
</script>

</body>
</html>
