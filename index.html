<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>道具價格快速查詢系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jschardet/3.0.0/jschardet.min.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", -apple-system, sans-serif; line-height: 1.6; color: #333; max-width: 900px; margin: 0 auto; padding: 20px; background-color: #f0f2f5; }
        h1 { text-align: center; color: #1a73e8; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .hidden { display: none; }
        
        /* 搜尋框 */
        .search-box { width: 100%; padding: 15px; border: 2px solid #dfe1e5; border-radius: 8px; font-size: 16px; margin-bottom: 15px; outline: none; transition: border 0.3s; }
        .search-box:focus { border-color: #1a73e8; }

        /* 道具按鈕列表 */
        .list-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; max-height: 500px; overflow-y: auto; padding: 10px; background: #fafafa; border-radius: 8px; }
        .item-btn { padding: 10px 5px; background: #fff; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; text-align: center; font-size: 14px; transition: all 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-btn:hover { background: #1a73e8; color: white; border-color: #1a73e8; transform: translateY(-2px); }

        /* 表格樣式 */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ededed; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; color: #5f6368; font-weight: bold; }
        .price-val { font-weight: bold; color: #d93025; font-size: 1.1em; }
        .npc-name { color: #188038; font-weight: 500; }

        .back-btn { padding: 10px 20px; background: #5f6368; color: white; border: none; border-radius: 6px; cursor: pointer; margin-bottom: 15px; font-size: 16px; }
        .back-btn:hover { background: #3c4043; }
        .loading-status { text-align: center; padding: 40px; font-size: 18px; color: #666; }
    </style>
</head>
<body>

    <h1>道具價格查詢系統</h1>

    <div id="status-msg" class="loading-status">正在讀取 item_price.csv...</div>

    <div id="main-ui" class="hidden">
        <div class="card">
            <h3>方法一：關鍵字搜尋</h3>
            <input type="text" id="keyword-input" class="search-box" placeholder="請輸入道具名稱關鍵字（例如：魔法書）...">
            <div id="search-list" class="list-container hidden"></div>
        </div>

        <div class="card">
            <h3>方法二：瀏覽所有道具</h3>
            <div id="full-list" class="list-container"></div>
        </div>
    </div>

    <div id="result-ui" class="hidden">
        <button class="back-btn" onclick="toggleView(false)">← 返回搜尋列表</button>
        <div class="card">
            <h2 id="display-title" style="color: #1a73e8; border-bottom: 2px solid #1a73e8; padding-bottom: 10px;"></h2>
            <table>
                <thead>
                    <tr>
                        <th>商人地點 / 名稱</th>
                        <th style="width: 150px;">價格 (高 → 低)</th>
                    </tr>
                </thead>
                <tbody id="result-table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        let rawData = [];
        let nameKey = ""; // 自動偵測的道具名稱欄位名稱

        async function init() {
            try {
                const resp = await fetch('item_price.csv');
                const buffer = await resp.arrayBuffer();
                
                // 強制偵測編碼
                const uint8 = new Uint8Array(buffer);
                const result = jschardet.detect(uint8);
                const encoding = result.encoding || 'UTF-8';

                const decoder = new TextDecoder(encoding);
                const text = decoder.decode(uint8);

                Papa.parse(text, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        if (results.data.length > 0) {
                            rawData = results.data;
                            // 修正欄位名稱可能含有的 BOM 或空白
                            const firstRow = results.meta.fields;
                            nameKey = firstRow.find(f => f.includes("道具名稱")) || firstRow[1];
                            
                            setupUI();
                        }
                    }
                });
            } catch (e) {
                document.getElementById('status-msg').innerText = "讀取失敗，請確認 item_price.csv 是否在相同目錄。";
            }
        }

        function setupUI() {
            document.getElementById('status-msg').style.display = 'none';
            document.getElementById('main-ui').classList.remove('hidden');

            renderItems(rawData, 'full-list');

            document.getElementById('keyword-input').addEventListener('input', (e) => {
                const val = e.target.value.trim().toLowerCase();
                const container = document.getElementById('search-list');
                if (!val) {
                    container.classList.add('hidden');
                    return;
                }
                const filtered = rawData.filter(r => String(r[nameKey]).toLowerCase().includes(val));
                renderItems(filtered, 'search-list');
                container.classList.remove('hidden');
            });
        }

        function renderItems(data, containerId) {
            const el = document.getElementById(containerId);
            el.innerHTML = '';
            data.forEach(item => {
                const name = item[nameKey];
                if (!name || name === "undefined") return;

                const btn = document.createElement('button');
                btn.className = 'item-btn';
                btn.innerText = name;
                btn.onclick = () => showDetail(item);
                el.appendChild(btn);
            });
        }

        function showDetail(row) {
            const title = row[nameKey];
            document.getElementById('display-title').innerText = title;
            const tbody = document.getElementById('result-table-body');
            tbody.innerHTML = '';

            let prices = [];
            Object.keys(row).forEach(key => {
                // 排除名稱和編號欄位
                if (key !== nameKey && !key.includes("編號")) {
                    const val = parseInt(String(row[key]).replace(/,/g, ''));
                    if (!isNaN(val) && val > 0) {
                        prices.push({ npc: key, price: val });
                    }
                }
            });

            // 排序：大到小
            prices.sort((a, b) => b.price - a.price);

            if (prices.length === 0) {
                tbody.innerHTML = '<tr><td colspan="2" style="text-align:center; padding:30px; color:#999;">此道具無有效的販售價格數據</td></tr>';
            } else {
                prices.forEach(p => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="npc-name">${p.npc}</td>
                        <td class="price-val">${p.price.toLocaleString()}</td>
                    `;
                    tbody.appendChild(tr);
                });
            }

            toggleView(true);
        }

        function toggleView(showResult) {
            if (showResult) {
                document.getElementById('main-ui').classList.add('hidden');
                document.getElementById('result-ui').classList.remove('hidden');
                window.scrollTo(0, 0);
            } else {
                document.getElementById('result-ui').classList.add('hidden');
                document.getElementById('main-ui').classList.remove('hidden');
            }
        }

        init();
    </script>
</body>
</html>
